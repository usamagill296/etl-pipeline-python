# Name of your workflow — shows on GitHub
name: ETL Pipeline CI

# TRIGGER — when does this run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# JOBS — what does the robot do?
jobs:
  run-etl-pipeline:
    # What operating system the robot uses
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the robot's machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install your libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run your ETL pipeline
      - name: Run ETL Pipeline
        run: python pipeline.py